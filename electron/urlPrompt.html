<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Media URL</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #121316;
        color: #f2f3f5;
      }

      main {
        padding: 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        color: #ff9f1a;
      }

      p {
        margin: 0 0 10px;
        font-size: 13px;
        color: #b5bac2;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        background: #17191d;
        border: 1px solid #3b3f46;
        color: #f2f3f5;
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 14px;
      }

      input:focus {
        outline: 2px solid rgba(255, 143, 0, 0.35);
        border-color: #ff8f00;
      }

      .actions {
        margin-top: 14px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      button {
        border-radius: 6px;
        border: 1px solid transparent;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
      }

      .cancel {
        background: #30343b;
        color: #f2f3f5;
      }

      .open {
        background: linear-gradient(180deg, #ff9f1a, #ff7f00);
        color: #18130b;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Open Media URL</h1>
      <p>Paste a direct video or panorama image URL.</p>
      <input
        id="media-url"
        type="url"
        placeholder="https://example.com/media.mp4"
      />
      <div class="actions">
        <button class="cancel" id="cancel-btn" type="button">Cancel</button>
        <button class="open" id="open-btn" type="button">Open</button>
      </div>
    </main>

    <script>
      const input = document.getElementById("media-url");
      const cancelBtn = document.getElementById("cancel-btn");
      const openBtn = document.getElementById("open-btn");

      const submit = () => {
        window.urlPrompt.submit(input.value || "");
      };

      cancelBtn.addEventListener("click", () => {
        window.urlPrompt.cancel();
      });

      openBtn.addEventListener("click", submit);

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          submit();
        }

        if (event.key === "Escape") {
          event.preventDefault();
          window.urlPrompt.cancel();
        }
      });

      window.urlPrompt.onInit((initialUrl) => {
        input.value = initialUrl;
        input.focus();
        input.select();
      });
    </script>
  </body>
</html>
